paths:
  base_dir: "Data"
  input_dir: "/Users/yadnesh/cybba/cybba_segment_automation/Data/Input/Raw_segments"
  output_dir: "/Users/yadnesh/cybba/cybba_segment_automation/Data/Output/Segment_Expansion"

files:
  input_a: "Data_Marketplace_Full_Catalog.csv"
  input_b: "Data_Marketplace_Segments_for_Cybba.csv"
  output_format: "Output_format.csv"

provider:
  cybba_name: "Cybba"

taxonomy:
  separator: " > "
  strip_leading_asterisks: true
  use_taxonomy_gating: false
  fallback_to_all_underived_if_missing_taxonomy: true
  output_max_levels: 2
  expected_total_nodes: 4

naming:
  provider_prefix: true
  taxonomy_levels: 2
  leaf_source_order: ["competitor", "underived", "fallback"]
  leaf_audience_suffix: true
  drop_if_leaf_looks_like_code: true

model:
  embedding: "tfidf"
  tfidf:
    ngram_min: 1
    ngram_max: 2
    stop_words: "english"
    min_df: 2
    max_features: 200000

generation:
  max_proposals: 500
  max_components: 2
  retrieval_pool_size: 50
  max_candidates_from_A: 5000
  fallback_l1: "Behavioral Audience"
  fallback_l2: "Lifestyle"
  min_composition_similarity: 0.15

coverage:
  enable: true
  cover_threshold: 0.85
  review_threshold: 0.85

dedupe:
  near_duplicate_threshold: 0.93
  resolve_name_collision: true
  collision_hash_len: 8

output:
  proposals_filename: "proposals.csv"
  proposals_validated_filename: "proposals_validated.csv"
  final_filename: "Cybba_New_Additional_Segments.csv"
  coverage_filename: "coverage.csv"
  log_filename: "run.log"

underived_id:
  strategy: "field_value"
  field_id_col: "LiveRamp Field ID"
  value_id_col: "LiveRamp Value ID"
  fallback_segment_id_col: "LiveRamp Segment ID"

training:
  taxonomy_train_file: "Output_format.csv"
  name_col: "New Segment Name"
  desc_col: "Segment Description"
  model_dir: "Data/Models"

descriptions:
  enable: true
  model: "llama3.1"
  batch_size: 20

pricing_model:
  enable: true
  model_path: "/Users/yadnesh/cybba/cybba_segment_automation/backend/models/pricing_model.joblib"
  defaults:
    provider_name: "Cybba"
    country: "USA"
    currency: "USD"
